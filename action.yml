name: 'AITriage Security Scan'
description: 'Deterministic security scanner for AI-generated codebases. SARIF gate + optional AI triage.'
author: 'cybertortuga'

inputs:
  command:
    description: 'aitriage subcommand to run: scan (default), agent, fix, sbom.'
    required: false
    default: 'scan'
  project-dir:
    description: 'Directory to scan. Default is the repository root.'
    required: false
    default: '.'
  format:
    description: 'Output format for scan: terminal, json, sarif, html.'
    required: false
    default: 'sarif'
  output-file:
    description: 'Write formatted scan output to this file (e.g. results.sarif).'
    required: false
    default: ''
  fail-on:
    description: 'When to exit non-zero (blocks the job): critical, any, never.'
    required: false
    default: 'critical'
  fail-score:
    description: 'Fail if the Health Check score is below this threshold (0 disables score gating).'
    required: false
    default: '0'
  health-profile:
    description: 'Health Check policy profile for the Security Gate: baseline, standard, strict.'
    required: false
    default: ''
  stack:
    description: 'Force a specific stack (e.g. nextjs, fastapi) instead of auto-detection.'
    required: false
    default: ''
  diff:
    description: 'Scan only files changed vs a git ref (e.g. origin/main, HEAD~1).'
    required: false
    default: ''
  baseline:
    description: 'Report only NEW findings not present in the baseline (true/false).'
    required: false
    default: 'false'
  args:
    description: 'Freeform extra args appended to the command (used for agent/fix/sbom or advanced flags).'
    required: false
    default: ''
  summary-file:
    description: 'Write the actionable summary (TP/NR only, no FP) to this file. Agent command only.'
    required: false
    default: ''

runs:
  using: 'docker'
  # Immutable linux/amd64 image for the v1 Action release. Update this digest
  # only as part of releasing a new Action version.
  image: 'docker://ghcr.io/cybertortuga/aitriage@sha256:cfba72be295ba54d1807ec8819ff9fbeb4fa57411f6ed0e4d276f8e6e5f4fd6a'
  entrypoint: '/entrypoint.sh'
  env:
    AITRIAGE_COMMAND: ${{ inputs.command }}
    AITRIAGE_PROJECT_DIR: ${{ inputs.project-dir }}
    AITRIAGE_FORMAT: ${{ inputs.format }}
    AITRIAGE_OUTPUT_FILE: ${{ inputs.output-file }}
    AITRIAGE_FAIL_ON: ${{ inputs.fail-on }}
    AITRIAGE_FAIL_SCORE: ${{ inputs.fail-score }}
    AITRIAGE_HEALTH_PROFILE: ${{ inputs.health-profile }}
    AITRIAGE_STACK: ${{ inputs.stack }}
    AITRIAGE_DIFF: ${{ inputs.diff }}
    AITRIAGE_BASELINE: ${{ inputs.baseline }}
    AITRIAGE_ARGS: ${{ inputs.args }}
    AITRIAGE_SUMMARY_FILE: ${{ inputs.summary-file }}

branding:
  icon: 'shield'
  color: 'blue'
