# ============================================================
# AITRIAGE RULES: FastAPI (Python) — Security
# ============================================================
# Covers: SQLi, SSTI, eval/exec, CSRF, auth, CORS,
# rate limiting, validation, error handling, secrets,
# and sync-in-async anti-patterns.
# ============================================================

rules:
  - id: FAST-LAZY-EXC
    name: "Lazy Exception Handling"
    stack: fastapi
    extensions: [".py"]
    target: all
    exclude_tests: true
    pattern: 'except\s+Exception(?:\s+as\s+\w+)?:\s*\n\s*pass\s*(?:#.*)?\n'
    suggestion: "HIGH: Blanket except:pass silently swallows errors. Log the exception or re-raise."

  - id: FAST-SYNC-ASYNC
    name: "Sync in Async Check"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: 'async\s+def\s+\w+.*:\s*\n(?:\s*.*\n)*\s*\w+\.commit\(\)'
    suggestion: "CRITICAL: Blocking db commit found inside async route handler."

  - id: FAST-SQLI
    name: "SQL Injection Risk"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: '(?i)(db\.execute|conn\.execute).*f".*\{.*\}'
    suggestion: "CRITICAL: Raw SQL interpolation detected. Use parameterized queries."

  - id: FAST-PATH-TRAVERSAL
    name: "Path Traversal Risk"
    stack: fastapi
    extensions: [".py"]
    target: ast
    pattern: |
      (call
        function: (identifier) @func
        arguments: (argument_list
          (string
            (interpolation)))
        (#eq? @func "open"))
    suggestion: "CRITICAL: f-strings inside `open()` enable Path Traversal attacks."

  - id: FAST-EVAL
    name: "Dangerous Eval/Exec"
    stack: fastapi
    extensions: [".py"]
    target: ast
    pattern: |
      (call
        function: (identifier) @func_name
        arguments: (argument_list (_) @arg)
        (#match? @func_name "^(eval|exec)$"))
    suggestion: "CRITICAL: Dynamic code execution via `eval` or `exec`. High risk of Shell Injection."

  - id: FAST-SSTI
    name: "Server-Side Template Injection"
    stack: fastapi
    extensions: [".py"]
    target: ast
    pattern: |
      (call
        function: (attribute
          object: (call
            function: [
              (identifier) @template_func
              (attribute attribute: (identifier) @template_func)
            ]
          )
          attribute: (identifier) @render_func)
        (#match? @template_func "^(Template|Environment|from_string)$")
        (#eq? @render_func "render"))
    suggestion: "CRITICAL: Template(user_input).render() — classic SSTI. Never pass user-controlled data to template constructors."

  - id: FAST-AUTH
    name: "Missing Authentication"
    stack: fastapi
    extensions: [".py"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(OAuth2PasswordBearer|HTTPBearer|HTTPBasic|APIKeyHeader|APIKeyQuery|jwt\.decode|jwt\.verify|firebase_admin\.auth|verify_id_token|get_current_user|CurrentUser)'
    suggestion: "HIGH: No authentication mechanisms found."

  - id: FAST-AUTHZ
    name: "Missing Authorization"
    stack: fastapi
    extensions: [".py"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(Security\(|\bRole\b|\bpermission\b|\bscope\b|is_admin|require_role|check_permission|get_current_active_user|CurrentUser|current_user)'
    suggestion: "HIGH: No authorization mechanisms found."

  - id: FAST-VAL
    name: "Missing Validation Schemas"
    stack: fastapi
    extensions: [".py"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(BaseModel|from pydantic|pydantic\.v1|marshmallow|TypedDict|dataclass)'
    suggestion: "HIGH: No Pydantic schemas found for input validation."

  - id: FAST-RATELIMIT
    name: "Missing Rate Limiting"
    stack: fastapi
    extensions: [".py", ".txt"]
    target: raw
    condition: "required_pattern"
    pattern: '(?i)(slowapi|Limiter)'
    suggestion: "HIGH: No rate limiter dependency."

  - id: FAST-ERROR
    name: "Missing Global Error Handling"
    stack: fastapi
    extensions: [".py"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(exception_handler|add_exception_handler|HTTPException|RequestValidationError|AppBaseException)'
    suggestion: "HIGH: No global exception handler registered."

  - id: FAST-HEADERS
    name: "Missing Security Headers"
    stack: fastapi
    extensions: [".py"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(SecureHeaders|CORSMiddleware|TrustedHostMiddleware)'
    suggestion: "MEDIUM: No security middleware found."

  - id: FAST-CORS
    name: "Missing CORS Policy"
    stack: fastapi
    extensions: [".py"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(CORSMiddleware|add_middleware.*CORS|Access-Control-Allow-Origin|cors_origins|allow_origins)'
    suggestion: "HIGH: No CORS policy configured."

  - id: FAST-SECRETS
    name: "Missing Secret Management"
    stack: fastapi
    extensions: [".py"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(pydantic_settings|BaseSettings|SettingsConfigDict|load_dotenv|dotenv_values|python-decouple|dynaconf|os\.environ|os\.getenv)'
    suggestion: "HIGH: No secret management found. Use pydantic-settings or python-dotenv."

  - id: FAST-ORM
    name: "Raw Database Access Without ORM"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: '(?i)\b(sqlite3|psycopg|asyncpg|pymysql|mysql\.connector|pymongo|motor)\b'
    condition: "not_contains:sqlalchemy"
    suggestion: "HIGH: Database driver detected without an ORM. Use parameterized queries or an ORM; do not interpolate untrusted SQL."

  - id: FAST-LOGGING
    name: "Missing Security Logging"
    stack: fastapi
    extensions: [".py", ".txt", ".toml"]
    target: raw
    condition: "required_pattern"
    pattern: '(?i)(loguru|logging|structlog)'
    suggestion: "MEDIUM: Dedicated logging library missing."

  - id: FAST-CSRF
    name: "Missing CSRF Protection"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: '(?i)(set_cookie|SessionMiddleware|request\.session|response\.set_cookie)'
    condition: "not_contains:csrf"
    suggestion: "HIGH: Cookie/session authentication detected without CSRF protection. Validate an origin-bound CSRF token for state-changing requests."

  - id: FAST-SSRF
    name: "SSRF Risk"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: '(?i)(?:httpx|aiohttp|requests)\.(get|post|put|delete)\s*\(\s*(?:request\.|params|query)'
    suggestion: "HIGH: User-controlled URL in HTTP request. Validate against an allowlist."

  - id: FAST-PICKLE
    name: "Insecure Deserialization"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: '(?i)(pickle\.loads?\(|joblib\.load\()'
    suggestion: "CRITICAL: pickle/joblib deserialization of untrusted data enables RCE. Use JSON."

  - id: FAST-SUBPROCESS
    name: "Unsafe Subprocess"
    stack: fastapi
    extensions: [".py"]
    target: all
    exclude_tests: true
    pattern: 'subprocess\.\w+\(.*shell\s*=\s*True'
    suggestion: "CRITICAL: subprocess with shell=True enables command injection. Use shell=False with argument list."

  - id: FAST-YAML
    name: "Unsafe YAML Load"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: 'yaml\.load\s*\('
    condition: "not_contains:SafeLoader"
    suggestion: "CRITICAL: yaml.load() without SafeLoader enables arbitrary code execution. Use yaml.safe_load()."

  - id: FAST-CORS-WILDCARD
    name: "CORS Allow All Origins"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: 'allow_origins\s*=\s*\[\s*"\*"\s*\]'
    suggestion: "HIGH: CORS configured to allow all origins. Restrict to specific trusted domains."

  - id: FAST-HARDCODED-SECRET
    name: "Hardcoded Secret Key"
    stack: fastapi
    extensions: [".py"]
    target: all
    exclude_tests: true
    pattern: "(?i)(?:secret_key|jwt_secret|api_key)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
    condition: "not_contains:os.environ"
    suggestion: "CRITICAL: Secret hardcoded. Load from pydantic-settings or environment variable."

  - id: FAST-OPEN-REDIRECT
    name: "Open Redirect"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: '(?i)RedirectResponse\s*\(\s*(?:request\.|url\s*=\s*(?:query|params))'
    suggestion: "HIGH: User-controlled redirect URL. Validate against an allowlist."

  - id: FAST-TEMPFILE
    name: "Insecure Temp File"
    stack: fastapi
    extensions: [".py"]
    target: all
    pattern: 'tempfile\.mktemp\s*\('
    suggestion: "MEDIUM: tempfile.mktemp() is vulnerable to race conditions. Use tempfile.mkstemp()."
