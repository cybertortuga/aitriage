# ============================================================
# AITRIAGE RULES: Universal — Secret Detection (Entropy-Based)
# ============================================================
# These rules are implemented in the Go engine itself
# (internal/engine/engine.go) using Shannon Entropy analysis.
# They are documented here for reference and visibility.
#
# Unlike regex-based rules, these use statistical analysis
# to detect high-entropy strings in variable assignments,
# catching secrets even with non-obvious variable names.
# ============================================================

rules:
  # NOTE: These two rules are hardcoded in the engine's
  # evaluateEntropy() function and use Shannon Entropy
  # thresholds rather than simple pattern matching.

  - id: ENTROPY-SECRET
    name: "Hardcoded Secret Detected"
    stack: universal
    # Scans: .go, .py, .ts, .tsx, .js, .jsx, .env
    # Skips: test files, node_modules, vendor
    target: "entropy-analysis"
    suggestion: "CRITICAL: Hardcoded secret found in source code. Move to environment variables and rotate the value immediately."

  - id: ENTROPY-SECRET-LEAK
    name: "Hardcoded Secret Leaked to Logger"
    stack: universal
    # Triggers when a detected secret is also passed to
    # a print/log/console function in the same file.
    target: "entropy-analysis"
    suggestion: "CRITICAL: Hardcoded secret is being logged. Remove the secret, remove the log statement, and rotate credentials immediately."
