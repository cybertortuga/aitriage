# ============================================================
# AITRIAGE RULES: Go — Security
# ============================================================
# Covers: SQL injection (concatenation), path traversal,
# insecure HTTP server configuration, and missing context
# in network calls.
# ============================================================

rules:
  - id: GO-SQLI
    name: "SQL Injection Risk (Concatenation)"
    stack: go
    extensions: [".go"]
    target: ast
    pattern: |
      (call_expression
        function: (selector_expression
          field: (field_identifier) @func)
        arguments: (argument_list
          (binary_expression
             operator: "+"
             left: (string)
             right: (identifier)))
        (#match? @func "^(Query|Exec|QueryRow)$"))
    suggestion: "CRITICAL: SQL query built with string concatenation. Use parameterized queries."

  - id: GO-PATH-TRAVERSAL
    name: "Path Traversal Risk"
    stack: go
    extensions: [".go"]
    target: ast
    pattern: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @pkg
          field: (field_identifier) @func)
        arguments: (argument_list
          (binary_expression
             operator: "+"
             left: (string)
             right: (identifier)))
        (#match? @pkg "^(os|ioutil)$")
        (#match? @func "^(Open|ReadFile)$"))
    suggestion: "CRITICAL: Path concatenation in file operations. Sanitize user input."

  - id: GO-HTTP-DOS
    name: "Insecure HTTP Server (DoS Risk)"
    stack: go
    extensions: [".go"]
    target: ast
    pattern: |
      (call_expression
        function: (selector_expression
          operand: (identifier) @mod
          field: (field_identifier) @func)
        (#eq? @mod "http")
        (#eq? @func "ListenAndServe"))
    suggestion: "HIGH: `http.ListenAndServe` lacks timeouts. Use `http.Server` struct."

  - id: GO-CONTEXT-LESS
    name: "Context-less Network Call"
    stack: go
    extensions: [".go"]
    target: ast
    pattern: |
      (call_expression
        function: (selector_expression
          field: (field_identifier) @func)
        arguments: (argument_list (_) @arg)
        (#match? @func "^(Get|Post|Do)$")
        (#not-type? @arg "context_identifier"))
    suggestion: "MEDIUM: Network call likely missing Context/Timeout. Use `WithContext`."

  - id: GO-CMD-INJECTION
    name: "Command Injection (os/exec)"
    stack: go
    extensions: [".go"]
    target: all
    exclude_tests: true
    pattern: 'exec\.Command\s*\(\s*(?:fmt\.Sprintf|.*\+)'
    suggestion: "CRITICAL: Shell command built with string concatenation/formatting. Pass arguments as separate strings to exec.Command()."

  - id: GO-MATH-RAND
    name: "Insecure Randomness (math/rand)"
    stack: go
    extensions: [".go"]
    target: all
    pattern: '"math/rand"'
    condition: "not_contains:crypto/rand"
    suggestion: "HIGH: math/rand is not cryptographically secure. Use crypto/rand for tokens, keys, and security-sensitive values."

  - id: GO-TLS-SKIP
    name: "Disabled TLS Verification"
    stack: go
    extensions: [".go"]
    target: all
    exclude_tests: true
    pattern: 'InsecureSkipVerify\s*:\s*true'
    suggestion: "HIGH: TLS certificate verification disabled. This makes connections vulnerable to MITM attacks."

  - id: GO-UNSAFE-PTR
    name: "Unsafe Pointer Usage"
    stack: go
    extensions: [".go"]
    target: all
    pattern: 'unsafe\.Pointer'
    suggestion: "MEDIUM: unsafe.Pointer bypasses Go's type safety. Minimize usage and audit carefully for memory corruption risks."

  - id: GO-ERR-BLANK
    name: "Error Assigned to Blank Identifier"
    stack: go
    extensions: [".go"]
    target: all
    exclude_tests: true
    pattern: '(?m)^\s*_\s*=\s*\w+\.\w+\('
    suggestion: "HIGH: Error return value discarded. Unhandled errors can mask security-critical failures (auth, crypto, I/O)."

  - id: GO-WEAK-TLS
    name: "Weak TLS Version"
    stack: go
    extensions: [".go"]
    target: all
    pattern: 'tls\.VersionTLS1[01]\b'
    suggestion: "HIGH: TLS 1.0/1.1 are deprecated and have known vulnerabilities. Use tls.VersionTLS12 or tls.VersionTLS13."

  - id: GO-EMBED-SECRET
    name: "Embedded Secret File"
    stack: go
    extensions: [".go"]
    target: all
    pattern: '//go:embed\s+.*(?:\.env|secret|credential|private)'
    suggestion: "CRITICAL: Sensitive file embedded in binary via go:embed. Secrets will be permanently baked into the compiled binary."

  - id: GO-SSRF
    name: "SSRF Risk"
    stack: go
    extensions: [".go"]
    target: all
    pattern: '(?i)http\.(Get|Post|NewRequest)\s*\(\s*(?:r\.|req\.|params|query)'
    suggestion: "HIGH: User-controlled URL passed to HTTP request. Validate against an allowlist to prevent SSRF."

  - id: GO-HARDCODED-CREDS
    name: "Hardcoded Credentials"
    stack: go
    extensions: [".go"]
    target: all
    exclude_tests: true
    pattern: '(?i)(?:password|passwd|secret)\s*[:=]\s*"[^"]{8,}"'
    suggestion: "HIGH: Hardcoded credentials in source code. Load from environment variables or a secrets manager."

  - id: GO-SQL-SPRINTF
    name: "SQL Query via fmt.Sprintf"
    stack: go
    extensions: [".go"]
    target: all
    pattern: '(?i)fmt\.Sprintf\s*\(\s*"(?:SELECT|INSERT|UPDATE|DELETE|DROP)\b'
    suggestion: "CRITICAL: SQL query built with fmt.Sprintf. Use database/sql parameterized queries with ? or $1 placeholders."
