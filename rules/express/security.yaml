# ============================================================
# AITRIAGE RULES: Express.js / Node.js — Security
# ============================================================
# Express is detected by the engine but previously had ZERO rules.
# These rules cover: helmet, NoSQL injection, session security,
# child_process, SSRF, XSS, rate limiting, authentication,
# and body parser configuration.
#
# Reference: OWASP, Semgrep p/expressjs, Node.js security guide.
# ============================================================

rules:
  - id: EXPRESS-HELMET
    name: "Missing Helmet Middleware"
    stack: express
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"helmet"'
    suggestion: "HIGH: Helmet middleware not found. It sets critical HTTP security headers (HSTS, CSP, X-Frame-Options, etc.)."

  - id: EXPRESS-NOSQL
    name: "NoSQL Injection Risk"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?i)\.(find|findOne|findOneAndUpdate|updateOne|deleteOne)\s*\(\s*req\.(body|query|params)'
    suggestion: "CRITICAL: Raw user input passed directly to MongoDB query. An attacker can inject operators ($ne, $gt) to bypass authentication. Validate and sanitize input with a schema (Zod/Joi) first."

  - id: EXPRESS-SESSION-INSECURE
    name: "Insecure Session Configuration"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?i)session\s*\(\s*\{[^}]*(?:secure\s*:\s*false|httpOnly\s*:\s*false)'
    suggestion: "HIGH: Session cookie missing secure or httpOnly flags. Cookies can be stolen via XSS or intercepted over HTTP."

  - id: EXPRESS-EVAL
    name: "Server-Side eval()"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    exclude_tests: true
    pattern: '(?m)^\s*eval\s*\('
    suggestion: "CRITICAL: eval() on server-side enables arbitrary code execution. Remove entirely."

  - id: EXPRESS-CHILD-PROC
    name: "Unsafe child_process Usage"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    exclude_tests: true
    pattern: '(?i)(?:exec|execSync)\s*\(\s*(?:`[^`]*\$\{|.*\+\s*(?:req\.|params|query|body))'
    suggestion: "CRITICAL: Shell command built with user input. Use execFile() with argument arrays to prevent command injection."

  - id: EXPRESS-SSRF
    name: "SSRF Risk"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?i)(?:axios|fetch|http\.get|https\.get|got|node-fetch)\s*\(\s*(?:req\.|params|query|body)'
    suggestion: "HIGH: User-controlled URL passed to HTTP client. Validate against an allowlist to prevent SSRF."

  - id: EXPRESS-SQLI
    name: "SQL Injection Risk"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?i)(?:\.query|\.execute)\s*\(\s*(?:`[^`]*\$\{|.*\+\s*req\.)'
    suggestion: "CRITICAL: SQL query built with template literal interpolation. Use parameterized queries."

  - id: EXPRESS-XSS
    name: "Reflected XSS via res.send"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    pattern: 'res\.(send|write)\s*\(.*req\.(query|params|body)'
    suggestion: "HIGH: User input reflected directly in HTTP response. Escape output or use a template engine."

  - id: EXPRESS-CORS
    name: "Missing CORS Middleware"
    stack: express
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"cors"'
    suggestion: "MEDIUM: No CORS middleware found. Configure cors() with explicit origin allowlist."

  - id: EXPRESS-RATELIMIT
    name: "Missing Rate Limiting"
    stack: express
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"(?i)(express-rate-limit|rate-limiter-flexible|express-slow-down)"'
    suggestion: "HIGH: No rate limiting middleware detected. Install express-rate-limit to prevent brute-force and DoS."

  - id: EXPRESS-AUTH
    name: "Missing Authentication"
    stack: express
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"(?i)(passport|express-jwt|jsonwebtoken|@clerk/express|express-session)"'
    suggestion: "HIGH: No authentication library found. Use passport.js or express-jwt for route protection."

  - id: EXPRESS-BODYPARSER-LIMIT
    name: "Missing Body Parser Size Limit"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?:bodyParser\.json|express\.json)\s*\(\s*\)'
    condition: "not_contains:limit"
    suggestion: "MEDIUM: JSON body parser has no size limit. Large payloads can cause memory exhaustion (DoS). Set {limit: '1mb'}."

  - id: EXPRESS-MONGO-SANITIZE
    name: "Missing MongoDB Sanitization"
    stack: express
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"(?i)(express-mongo-sanitize|mongo-sanitize|sanitize)"'
    suggestion: "HIGH: No MongoDB input sanitization library found. Install express-mongo-sanitize to strip $-operators from input."

  - id: EXPRESS-OPEN-REDIRECT
    name: "Open Redirect"
    stack: express
    extensions: [".ts", ".js"]
    target: all
    pattern: 'res\.redirect\s*\(\s*req\.(query|params|body)'
    suggestion: "HIGH: User-controlled URL in redirect. Validate against an allowlist to prevent phishing."
