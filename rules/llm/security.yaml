# ============================================================
# AITRIAGE RULES: LLM / AI Security
# ============================================================
# Based on OWASP Top 10 for LLM Applications 2025.
# These rules detect code-level patterns that indicate
# unsafe LLM integration: prompt injection vectors,
# insecure output handling, excessive agency, and
# sensitive data in prompts.
#
# These are unique to AITriage — no other SAST tool ships
# with LLM-specific security rules.
# ============================================================

rules:
  - id: LLM-OUTPUT-EXEC
    name: "LLM Output Passed to exec/eval (Insecure Output Handling)"
    stack: universal
    extensions: [".py", ".ts", ".js"]
    target: all
    pattern: '(?i)(?:completion|response|output|result|answer|reply|generated|llm_output|ai_response).*(?:eval|exec|subprocess|os\.system|child_process)\s*\('
    suggestion: "CRITICAL [OWASP LLM05]: LLM output appears to be passed to code execution functions. Never exec/eval AI-generated content without sandboxing and validation."

  - id: LLM-OUTPUT-SQL
    name: "LLM Output in SQL Query"
    stack: universal
    extensions: [".py", ".ts", ".js", ".go"]
    target: all
    pattern: '(?i)(?:completion|response|output|generated|llm_output|ai_response).*(?:\.query|\.execute|db\.|cursor\.|sql)'
    suggestion: "CRITICAL [OWASP LLM05]: LLM output used in database query. AI can be manipulated via prompt injection to generate malicious SQL. Always use parameterized queries."

  - id: LLM-SYSTEM-PROMPT-CLIENT
    name: "System Prompt Exposed in Client Code"
    stack: universal
    extensions: [".tsx", ".jsx", ".ts", ".js"]
    target: all
    pattern: '(?i)(system\s*:\s*["\x27`]You are|systemPrompt\s*=\s*["\x27`]|system_prompt\s*=\s*["\x27`]|role\s*:\s*["\x27]system["\x27])'
    condition: "not_contains:server"
    suggestion: "HIGH [OWASP LLM07]: System prompt found in client-side code. Attackers can read and reverse-engineer your instructions. Move system prompts to the backend."

  - id: LLM-EXCESSIVE-AGENCY
    name: "LLM Output Used for File/DB Operations (Excessive Agency)"
    stack: universal
    extensions: [".py", ".ts", ".js", ".go"]
    target: all
    pattern: '(?i)(?:completion|response|output|generated|llm_output|ai_response).*(?:fs\.|open\(|writeFile|unlink|rmdir|os\.remove|shutil)'
    suggestion: "HIGH [OWASP LLM06]: LLM output directly controls file system operations. Implement human-in-the-loop confirmation or strict allowlists for destructive actions."

  - id: LLM-SENSITIVE-IN-PROMPT
    name: "Sensitive Data in Prompt Template"
    stack: universal
    extensions: [".py", ".ts", ".js", ".go"]
    target: all
    pattern: '(?i)(?:prompt|system_message|instruction).*(?:password|api_key|secret_key|private_key|access_token|credit_card|ssn)'
    suggestion: "CRITICAL [OWASP LLM02]: Sensitive data (passwords, API keys, PII) detected in prompt template. The LLM may leak this in its output. Remove sensitive data from prompts."

  - id: LLM-NO-OUTPUT-VALIDATION
    name: "Missing LLM Output Schema Validation"
    stack: universal
    extensions: [".py", ".ts", ".js"]
    target: all
    pattern: '(?i)(?:completion|response|choices\[0\]|message\.content|generated_text).*(?:JSON\.parse|json\.loads)\s*\('
    condition: "not_contains:schema"
    suggestion: "HIGH [OWASP LLM05]: LLM output parsed as JSON without schema validation. AI outputs are non-deterministic — validate against a strict schema (Zod, Pydantic) before use."

  - id: LLM-PROMPT-CONCAT
    name: "User Input Concatenated into Prompt"
    stack: universal
    extensions: [".py", ".ts", ".js"]
    target: all
    pattern: '(?i)(?:prompt|system_message|messages)\s*(?:\+|\.format|f"|`\$\{).*(?:req\.|request\.|user_input|input|query|params)'
    suggestion: "HIGH [OWASP LLM01]: User input directly concatenated into LLM prompt. This enables prompt injection attacks. Use structured input formatting with clear delimiters and input validation."

  - id: LLM-API-KEY-EXPOSED
    name: "LLM API Key in Frontend"
    stack: universal
    extensions: [".tsx", ".jsx", ".ts", ".js"]
    target: all
    pattern: '(?i)(openai|anthropic|gemini|cohere|replicate).*(?:api[_-]?key|token|secret)\s*[:=]\s*["\x27](?:sk-|key-|ant-)'
    suggestion: "CRITICAL [OWASP LLM03]: LLM provider API key found in client-side code. Move to backend environment variables. Exposed keys can rack up unlimited charges."

  - id: LLM-NO-TIMEOUT
    name: "Missing LLM Request Timeout"
    stack: universal
    extensions: [".py", ".ts", ".js"]
    target: all
    pattern: '(?i)(?:openai|anthropic|client)\.\w+\.create\s*\('
    condition: "not_contains:timeout"
    suggestion: "MEDIUM [OWASP LLM10]: LLM API call without timeout. Unbounded requests can hang indefinitely and exhaust resources."

  - id: LLM-NO-TOKEN-LIMIT
    name: "Missing Max Token Limit"
    stack: universal
    extensions: [".py", ".ts", ".js"]
    target: all
    pattern: '(?i)(?:openai|anthropic|client)\.\w+\.create\s*\('
    condition: "not_contains:max_tokens"
    suggestion: "MEDIUM [OWASP LLM10]: LLM API call without max_tokens limit. Without a cap, a single request can consume excessive tokens and inflate costs."
