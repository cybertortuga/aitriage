# ============================================================
# AITRIAGE RULES: Flask (Python) — Security
# ============================================================
# Covers: CSRF, auth, rate limiting, security headers,
# ORM, secret management, and debug mode detection.
# ============================================================

rules:
  - id: FLASK-CSRF
    name: "Missing CSRF Protection"
    stack: flask
    files: ["requirements.txt", "pyproject.toml", "Pipfile"]
    target: code
    pattern_not: '(?i)(flask-wtf|flask_wtf|wtforms|csrf|crsf)'
    suggestion: "HIGH: No CSRF protection found. Install Flask-WTF and use CSRFProtect(app)."

  - id: FLASK-AUTH
    name: "Missing Authentication"
    stack: flask
    files: ["requirements.txt", "pyproject.toml", "Pipfile"]
    target: code
    pattern_not: '(?i)(flask-login|flask_login|flask-jwt|flask_jwt|flask-security|authlib)'
    suggestion: "HIGH: No authentication library found. Use Flask-Login or flask-jwt-extended."

  - id: FLASK-RATELIMIT
    name: "Missing Rate Limiting"
    stack: flask
    files: ["requirements.txt", "pyproject.toml", "Pipfile"]
    target: code
    pattern_not: '(?i)(flask-limiter|flask_limiter|slowapi|limits)'
    suggestion: "HIGH: No rate limiter found. Use Flask-Limiter."

  - id: FLASK-HEADERS
    name: "Missing Security Headers"
    stack: flask
    files: ["requirements.txt", "pyproject.toml", "Pipfile"]
    target: code
    pattern_not: '(?i)(flask-talisman|talisman|flask-seasurf|flask_talisman)'
    suggestion: "HIGH: No security headers middleware. Use Flask-Talisman for HSTS, CSP, X-Frame-Options."

  - id: FLASK-ORM
    name: "Missing ORM (Parameterized Queries)"
    stack: flask
    files: ["requirements.txt", "pyproject.toml", "Pipfile"]
    target: code
    pattern_not: '(?i)(sqlalchemy|flask-sqlalchemy|flask_sqlalchemy|peewee|tortoise|piccolo)'
    suggestion: "HIGH: No ORM detected. Use Flask-SQLAlchemy to prevent SQL injection."

  - id: FLASK-SECRETS
    name: "Missing Secret Key Config"
    stack: flask
    extensions: [".py"]
    target: code
    pattern_not: '(?i)(os\.environ|os\.getenv|SECRET_KEY\s*=\s*os)'
    files: ["app.py", "config.py", "settings.py", "__init__.py"]
    suggestion: "CRITICAL: No env-based SECRET_KEY found. Hardcoded secret keys compromise session security."

  - id: FLASK-DEBUG
    name: "Debug Mode in Production"
    stack: flask
    extensions: [".py"]
    target: code
    pattern: '(?i)app\.run\s*\([^)]*debug\s*=\s*True'
    suggestion: "CRITICAL: app.run(debug=True) enables an interactive debugger with arbitrary code execution."

  - id: FLASK-SSTI
    name: "Server-Side Template Injection"
    stack: flask
    extensions: [".py"]
    target: all
    pattern: 'render_template_string\s*\('
    suggestion: "CRITICAL: render_template_string() with user input enables SSTI (Remote Code Execution). Use render_template() with .html files."

  - id: FLASK-PICKLE
    name: "Insecure Deserialization"
    stack: flask
    extensions: [".py"]
    target: all
    pattern: '(?i)(pickle\.loads?\(|marshal\.loads?\()'
    suggestion: "CRITICAL: pickle/marshal deserialization from untrusted sources enables RCE. Use JSON."

  - id: FLASK-OPEN-REDIRECT
    name: "Open Redirect"
    stack: flask
    extensions: [".py"]
    target: all
    pattern: '(?i)redirect\s*\(\s*request\.(args|form|values)\.get'
    suggestion: "HIGH: User-controlled redirect URL. Validate against an allowlist to prevent phishing."

  - id: FLASK-RAW-SQL
    name: "Raw SQL Query"
    stack: flask
    extensions: [".py"]
    target: all
    pattern: '(?i)db\.engine\.execute\s*\(|db\.session\.execute\s*\(\s*(?:f"|text\(f")'
    suggestion: "CRITICAL: Raw SQL with string interpolation. Use SQLAlchemy ORM or text() with bound parameters."

  - id: FLASK-SECRET-HARDCODED
    name: "Hardcoded Secret Key"
    stack: flask
    extensions: [".py"]
    target: all
    pattern: "app\\.(?:secret_key|config\\[.SECRET_KEY.\\])\\s*=\\s*['\"][^'\"]{8,}['\"]"
    suggestion: "CRITICAL: SECRET_KEY hardcoded. Load from environment variable: app.secret_key = os.environ['SECRET_KEY']."

  - id: FLASK-SEND-FILE
    name: "Path Traversal via send_file"
    stack: flask
    extensions: [".py"]
    target: all
    pattern: 'send_file\s*\(\s*(?:request\.|os\.path\.join\s*\(.*request\.)'
    suggestion: "HIGH: User-controlled path in send_file(). Validate and sanitize filename. Use send_from_directory() with a fixed base path."

  - id: FLASK-UNSAFE-COOKIE
    name: "Insecure Session Cookie"
    stack: flask
    extensions: [".py"]
    target: all
    pattern: "SESSION_COOKIE_SECURE\\s*=\\s*False|SESSION_COOKIE_HTTPONLY\\s*=\\s*False"
    suggestion: "HIGH: Session cookies missing Secure or HttpOnly flag. Set both to True in production."
