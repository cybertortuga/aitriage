# ============================================================
# AITRIAGE RULES: Next.js / React — Security
# ============================================================
# Covers: XSS, SQLi, CSRF, JWT, auth, input validation,
# rate limiting, error boundaries, path traversal,
# command injection, and prototype pollution.
# ============================================================

rules:
  - id: ENTR-03
    name: "Unverified JWT Decoding"
    stack: nextjs
    extensions: [".ts", ".js"]
    target: ast
    pattern: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj
          property: (property_identifier) @prop)
        (#eq? @obj "jwt")
        (#eq? @prop "decode"))
    suggestion: "CRITICAL: `jwt.decode()` does NOT verify the signature. Use `jwt.verify()` instead."

  - id: ENTR-07
    name: "TypeScript Surrender"
    stack: nextjs
    extensions: [".ts", ".tsx"]
    target: lines_percentage
    exclude_tests: true
    pattern: '(?i)//\s*@ts-ignore|:\s*any\b'
    condition: "threshold:0.02"
    suggestion: "HIGH: Excessive @ts-ignore or 'any' types. Fix type safety."

  - id: ENTR-09
    name: "Client-Side Secret Leak"
    stack: nextjs
    extensions: [".ts", ".tsx", ".js", ".jsx"]
    target: all
    condition: "contains:'use client'"
    pattern: 'process\.env\.(DATABASE_URL|AUTH_SECRET|API_KEY|TOKEN\w*)'
    suggestion: "CRITICAL: Never use raw process.env inside 'use client'. Prefix with NEXT_PUBLIC_."

  - id: NEXT-AUTH
    name: "Missing Auth Middleware"
    stack: nextjs
    extensions: [".ts", ".tsx", ".js", ".jsx"]
    target: filename
    pattern: 'middleware\.(ts|js)'
    condition: "missing"
    suggestion: "HIGH: Missing Next.js middleware. Routes may be unauthenticated."

  - id: NEXT-CORS
    name: "Missing CORS"
    stack: nextjs
    extensions: [".ts", ".tsx", ".js", ".jsx"]
    target: all
    pattern: 'export\s+(?:async\s+)?function\s+(?:GET|POST|PUT|DELETE|PATCH)'
    condition: "not_contains:Access-Control-Allow-Origin"
    suggestion: "MEDIUM: Route handler missing CORS headers."

  - id: NEXT-CSRF
    name: "Missing CSRF"
    stack: nextjs
    extensions: [".ts", ".tsx", ".js", ".jsx"]
    target: all
    pattern: 'export\s+(?:async\s+)?function\s+(?:POST|PUT|DELETE|PATCH)'
    condition: "not_contains:csrf"
    suggestion: "HIGH: Missing CSRF token validation on mutative route."

  - id: NEXT-SQLI
    name: "SQL Injection Risk"
    stack: nextjs
    extensions: [".ts", ".tsx", ".js", ".jsx"]
    target: all
    pattern: '(?i)(db\.query|db\.execute|sql)\s*`.*?\$\{.*?\}.*?`'
    suggestion: "CRITICAL: Raw SQL interpolation detected. Use parameterized queries."

  - id: REACT-XSS
    name: "Dangerous Property (XSS Risk)"
    stack: nextjs
    extensions: [".tsx", ".jsx", ".js"]
    target: ast
    pattern: |
      (jsx_attribute
        name: (property_identifier) @attr_name
        (#eq? @attr_name "dangerouslySetInnerHTML"))
    suggestion: "CRITICAL: Direct use of `dangerouslySetInnerHTML` bypasses XSS protection."

  - id: JWT-HARDCODED
    name: "Hardcoded JWT Secret"
    stack: nextjs
    extensions: [".ts", ".js"]
    target: ast
    pattern: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj
          property: (property_identifier) @prop)
        arguments: (arguments (_) (string) @secret)
        (#eq? @obj "jwt")
        (#eq? @prop "sign"))
    suggestion: "CRITICAL: Hardcoded string used as a JWT secret. Use environment variables."

  - id: REACT-HAPPY-PATH
    name: "Missing Async Error Handling"
    stack: nextjs
    extensions: [".tsx", ".ts", ".js"]
    target: ast
    pattern: |
      (arrow_function
        (modifier) @async
        (#eq? @async "async")
        body: (statement_block
          (expression_statement
            (await_expression)) @stmt)
        (#not-has-ancestor? @stmt try_statement))
    suggestion: "HIGH: Async function missing `try/catch`. Will crash on network errors."

  - id: NEXT-AUTHZ
    name: "Missing Authorization Checks"
    stack: nextjs
    extensions: [".ts", ".tsx", ".js", ".jsx"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(role|permission|authorize|casl|ability)'
    suggestion: "HIGH: No role/permission authorization patterns detected."

  - id: NEXT-VAL
    name: "Missing Input Validation"
    stack: nextjs
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"(?i)(zod|yup|joi|class-validator)"'
    suggestion: "HIGH: Input validation libraries missing."

  - id: NEXT-RATELIMIT
    name: "Missing Rate Limiting"
    stack: nextjs
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"(?i)(@upstash/ratelimit|rate-limiter-flexible|express-rate-limit)"'
    suggestion: "HIGH: No rate limit libraries detected."

  - id: NEXT-ERROR
    name: "Missing Global Error Handling"
    stack: nextjs
    extensions: [".tsx", ".jsx"]
    target: filename
    condition: "missing"
    pattern: 'error\.(tsx|jsx)'
    suggestion: "HIGH: Missing error.tsx boundary."

  - id: NEXT-HEADERS
    name: "Missing Security Headers"
    stack: nextjs
    extensions: [".js", ".mjs"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(headers\(\)|securityHeaders)'
    suggestion: "HIGH: No explicit security headers defined in next.config."

  - id: NEXT-SECRETS
    name: "Missing Secrets Config"
    stack: nextjs
    extensions: [".env.example", ".env.local.example"]
    target: filename
    condition: "missing"
    pattern: '.*'
    suggestion: "MEDIUM: Missing .env.example template."

  - id: NEXT-ORM
    name: "Missing ORM (Parameterized Queries)"
    stack: nextjs
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"(?i)(prisma|drizzle-orm|typeorm|sequelize)"'
    suggestion: "HIGH: No ORM found. Raw queries risk SQLi."

  - id: NEXT-LOGGING
    name: "Missing Security Logging"
    stack: nextjs
    extensions: [".json"]
    target: raw
    condition: "required_pattern"
    pattern: '"(?i)(winston|pino|morgan)"'
    suggestion: "MEDIUM: No dedicated logging library found."

  - id: JS-PATH-TRAVERSAL
    name: "Path Traversal Risk (JS/TS)"
    stack: nextjs
    extensions: [".ts", ".js", ".tsx", ".jsx"]
    target: ast
    pattern: |
      (call_expression
        function: (member_expression
          object: (identifier) @obj
          property: (property_identifier) @prop)
        arguments: (arguments (template_string) @arg)
        (#match? @obj "^(fs|path)$")
        (#match? @prop "^(readFile|writeFile|join|resolve)$"))
    suggestion: "CRITICAL: User input in file system operations. Sanitize paths."

  - id: JS-COMMAND-INJECTION
    name: "Command Injection Risk (JS/TS)"
    stack: nextjs
    extensions: [".ts", ".js"]
    target: ast
    exclude_tests: true
    pattern: |
      (call_expression
        function: (identifier) @func
        arguments: (arguments (template_string
          (template_substitution) @interp))
        (#match? @func "^(exec|spawn|execSync|spawnSync)$"))
    suggestion: "HIGH: Shell command built with dynamic interpolation. Use execFile() with argument arrays."

  - id: ENTR-PROTO-POLLUTION
    name: "Prototype Pollution Risk"
    stack: nextjs
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?i)(Object\.assign|JSON\.parse).*?\[.*?\]\s*='
    suggestion: "HIGH: Potential Prototype Pollution. Verify input before merging."

  - id: NEXT-UNSAFE-HREF
    name: "XSS via javascript: href"
    stack: nextjs
    extensions: [".tsx", ".jsx", ".js"]
    target: all
    pattern: 'href\s*=\s*\{?\s*[`"\x27]javascript:'
    suggestion: "CRITICAL: javascript: URI in href enables XSS. Validate URL protocols (allow only http/https/mailto)."

  - id: NEXT-SSRF
    name: "SSRF Risk in API Route"
    stack: nextjs
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?i)(?:fetch|axios)\s*\(\s*(?:req\.|request\.|searchParams|params)'
    suggestion: "HIGH: User-controlled URL in server-side fetch. Validate against an allowlist."

  - id: NEXT-SERVER-ACTION-EXPOSED
    name: "Server Action Without Auth Check"
    stack: nextjs
    extensions: [".ts", ".tsx"]
    target: all
    pattern: "^['\"]use server['\"]"
    condition: "not_contains:session"
    suggestion: "HIGH: Server Action file without authentication check. Anyone can invoke these functions. Verify session/auth at the top."

  - id: NEXT-MATH-RANDOM
    name: "Insecure Randomness"
    stack: nextjs
    extensions: [".ts", ".js", ".tsx", ".jsx"]
    target: all
    pattern: 'Math\.random\s*\(\)'
    suggestion: "HIGH: Math.random() is predictable. Use crypto.randomUUID() for tokens, IDs, and security-sensitive values."

  - id: NEXT-CSP-MISSING
    name: "Missing Content Security Policy"
    stack: nextjs
    extensions: [".js", ".mjs", ".ts"]
    target: all
    condition: "required_pattern"
    pattern: '(?i)(Content-Security-Policy|contentSecurityPolicy|CSP)'
    suggestion: "HIGH: No Content Security Policy configured. CSP prevents XSS and data injection attacks."

  - id: NEXT-PUBLIC-LEAK
    name: "Sensitive Data in NEXT_PUBLIC_ Variable"
    stack: nextjs
    extensions: [".env", ".env.local"]
    target: all
    pattern: '(?i)NEXT_PUBLIC_\S*(SECRET|PASSWORD|PRIVATE|TOKEN|API_KEY|DATABASE)'
    suggestion: "CRITICAL: NEXT_PUBLIC_ variables are exposed to the browser. Never prefix secrets with NEXT_PUBLIC_."

  - id: NEXT-NOSQL
    name: "NoSQL Injection Risk"
    stack: nextjs
    extensions: [".ts", ".js"]
    target: all
    pattern: '(?i)\.(find|findOne|aggregate)\s*\(\s*(?:req\.|searchParams|body|params)'
    suggestion: "CRITICAL: User input passed directly to MongoDB query. Sanitize and validate input schema."
