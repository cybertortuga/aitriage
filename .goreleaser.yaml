# ==============================================================================
# AITriage — GoReleaser Configuration
# ==============================================================================
# Builds cross-platform binaries, publishes to GitHub Releases,
# generates checksums, and pushes Homebrew formula.
# Triggered by: git tag v* → .github/workflows/release.yml
# ==============================================================================

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: aitriage
    main: ./cmd/aitriage
    binary: aitriage
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: "🔒 Security"
      regexp: '^.*?(feat|fix)\(security\).*$'
      order: 0
    - title: "🚀 Features"
      regexp: '^.*?feat(\(.+\))?!?:.*$'
      order: 1
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\(.+\))?!?:.*$'
      order: 2
    - title: "📦 Other"
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

# ── Homebrew ──────────────────────────────────────────────────────────────────
# Requires: cybertortuga/homebrew-aitriage repo + HOMEBREW_TAP_GITHUB_TOKEN secret
# Users install via: brew install cybertortuga/aitriage/aitriage
homebrew_casks:
  - name: aitriage
    repository:
      owner: cybertortuga
      name: homebrew-aitriage
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/cybertortuga/aitriage"
    description: "AI-Powered Security Audit Engine — 180+ rules, 11 stacks, zero dependencies"
    license: "MIT"

# ── Release Notes ─────────────────────────────────────────────────────────────
release:
  github:
    owner: cybertortuga
    name: aitriage
  name_template: "AITriage v{{ .Version }}"
  header: |
    ## AITriage v{{ .Version }}

    AI-Powered Security Audit Engine with 180+ built-in rules across 11 technology stacks.

    ### Install
    ```bash
    # macOS / Linux (Homebrew)
    brew install cybertortuga/aitriage/aitriage

    # Go
    go install github.com/cybertortuga/aitriage/cmd/aitriage@v{{ .Version }}

    # Binary download — see assets below
    ```
  footer: |
    **Full Changelog**: https://github.com/cybertortuga/aitriage/compare/{{ .PreviousTag }}...{{ .Tag }}
