<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Premium Quartz gradients -->
    <linearGradient id="quartzGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#f1f5f9" />
      <stop offset="70%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#cbd5e1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background tile for contrast -->
  <rect width="32" height="32" rx="7" fill="#09090b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Outer glowing hexagon ring -->
  <path d="M16 4 L26 9.8 L26 22.2 L16 28 L6 22.2 L6 9.8 Z" fill="none" stroke="url(#glowGrad)" stroke-width="1.2" filter="url(#glow)" />

  <!-- Inner shield/crystal contour -->
  <path d="M16 6.5 L24 11.1 L24 20.9 L16 25.5 L8 20.9 L8 11.1 Z" fill="#0c0a09" stroke="url(#quartzGrad)" stroke-width="1.5" stroke-linejoin="round" />

  <!-- Central stylized 'A' faceted prism -->
  <!-- Left facet -->
  <path d="M16 9 L16 22.5 L12 20.5 Z" fill="#475569" opacity="0.95" />
  <!-- Right facet -->
  <path d="M16 9 L20 20.5 L16 22.5 Z" fill="#e2e8f0" />
  <!-- Top facet -->
  <path d="M16 9 L18.5 18 L13.5 18 Z" fill="#ffffff" />
  <!-- Horizontal belt/bridge for the 'A' shape -->
  <path d="M13.5 18 L18.5 18 L16 19.5 Z" fill="#94a3b8" />
</svg>